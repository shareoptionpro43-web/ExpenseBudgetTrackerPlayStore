name: BudgetBuddy — Build & Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1 — Debug APK (every push/PR)
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Bootstrap Gradle Wrapper JAR
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          GRADLE_VERSION="8.6"
          if [ ! -f "$WRAPPER_JAR" ]; then
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$WRAPPER_JAR" || \
            (
              curl -fsSL \
                "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
                -o /tmp/gradle.zip && \
              unzip -j /tmp/gradle.zip \
                "gradle-${GRADLE_VERSION}/lib/gradle-wrapper-*.jar" \
                -d /tmp/gw/ && \
              cp /tmp/gw/gradle-wrapper-*.jar "$WRAPPER_JAR"
            ) || \
            (sudo apt-get install -y gradle -q && gradle wrapper --gradle-version=$GRADLE_VERSION)
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run Lint
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon
        continue-on-error: true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BudgetBuddy-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 — Signed Release AAB (main branch only) — for Play Store
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Build Release AAB (Play Store)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Bootstrap Gradle Wrapper JAR
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          GRADLE_VERSION="8.6"
          if [ ! -f "$WRAPPER_JAR" ]; then
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$WRAPPER_JAR" || \
            (sudo apt-get install -y gradle -q && gradle wrapper --gradle-version=$GRADLE_VERSION)
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode Keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > app/release.keystore
            echo "KEYSTORE_PATH=release.keystore" >> $GITHUB_ENV
            echo "Keystore decoded"
          else
            echo "KEYSTORE_PATH=" >> $GITHUB_ENV
            echo "No keystore — building unsigned AAB"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Rename AAB
        run: |
          mkdir -p artifacts
          find app/build/outputs/bundle/release -name "*.aab" | head -1 | \
            xargs -I{} cp {} artifacts/BudgetBuddy-v1.0.${{ github.run_number }}-release.aab
          ls -lh artifacts/

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: BudgetBuddy-release-aab-${{ github.run_number }}
          path: artifacts/BudgetBuddy-v1.0.${{ github.run_number }}-release.aab
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "BudgetBuddy v1.0.${{ github.run_number }}"
          body: |
            ## BudgetBuddy — Home Expense & Budget Tracker

            ### Features
            - Track expenses across 16 categories
            - Monthly budgets with progress alerts
            - Auto-import from UPI SMS (GPay, PhonePe, Paytm, BHIM, banks)
            - Filter by UPI provider and month
            - Charts, CSV export, Powered by Anil

            ### Install
            Upload the .aab file to Google Play Console.
            For direct install, download the debug APK from the Actions artifacts.

            **Build:** #${{ github.run_number }} | **Commit:** `${{ github.sha }}`
          files: artifacts/BudgetBuddy-v1.0.${{ github.run_number }}-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
